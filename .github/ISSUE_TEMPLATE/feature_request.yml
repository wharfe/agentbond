name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@agentbond/core"
        - "@agentbond/auth"
        - "@agentbond/mcp-server"
        - New package
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered.

  - type: checkboxes
    id: design-principles
    attributes:
      label: Design Principle Alignment
      description: Which design principles does this align with?
      options:
        - label: "Discoverability — agents can find and understand it"
        - label: "Predictability — same input, same output"
        - label: "Least Privilege — minimal permissions"
        - label: "Auditability — actions are verifiable"
        - label: "Zero Breaking Changes — backward compatible"
